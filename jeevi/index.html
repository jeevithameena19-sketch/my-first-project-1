<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeevitha K S - Professional Portfolio</title>
    <meta name="description" content="Welcome to the professional portfolio of Jeevitha K S.">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Hero Section Specific Styles */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4rem;
        }

        .hero-content {
            flex: 1;
        }

        .hero-subtitle {
            color: var(--primary);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 1rem;
            display: block;
        }

        .hero-title {
            font-size: 4rem;
            margin-bottom: 1rem;
            color: var(--text-main);
        }

        .hero-desc {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            max-width: 600px;
        }

        .hero-actions {
            display: flex;
            gap: 1rem;
        }

        .hero-image-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .hero-image {
            width: 350px;
            height: 350px;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            object-fit: cover;
            border: 4px solid var(--surface-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: morph 8s ease-in-out infinite;
            position: relative;
            z-index: 2;
        }

        .hero-blob {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, rgba(6, 182, 212, 0.2), rgba(139, 92, 246, 0.2));
            filter: blur(40px);
            border-radius: 50%;
            z-index: 1;
            animation: pulse 6s infinite alternate;
        }

        @keyframes morph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 70% 30% 30% 70% / 70% 70% 30% 30%; }
            100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.7; }
            100% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
        }

        @media (max-width: 992px) {
            .hero {
                flex-direction: column-reverse;
                text-align: center;
                margin-top: 2rem;
            }
            .hero-title { font-size: 3rem; }
            .hero-desc { margin: 0 auto 2.5rem; }
            .hero-actions { justify-content: center; }
            .hero-image { width: 280px; height: 280px; }
            .hero-blob { width: 320px; height: 320px; }
        }
    </style>
</head>
<body>

    <main class="section fade-in">
        <div class="container hero">
            <div class="hero-content">
                <span class="hero-subtitle fade-in delay-1">Hello, I'm</span>
                <h1 class="hero-title fade-in delay-1">
                    Jeevitha K S
                </h1>
                <h2 class="hero-title text-gradient fade-in delay-2" style="font-size: 2.5rem; margin-bottom: 1.5rem;">
                    Building digital experiences.
                </h2>
                <p class="hero-desc fade-in delay-2">
                    I'm a passionate professional dedicated to creating beautiful, functional, and user-centric solutions. Explore my profile and let's build something amazing together.
                </p>
                <div class="hero-actions fade-in delay-3">
                    <a href="about.html" class="btn btn-primary">About Me</a>
                    <a href="contact.html" class="btn btn-outline">Contact Me</a>
                </div>
            </div>
            
            <div class="hero-image-wrapper fade-in delay-1">
                <div class="hero-blob"></div>
                <img src="jeevi1711.jpeg" alt="Jeevitha K S" class="hero-image">
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
</body>
</html>
