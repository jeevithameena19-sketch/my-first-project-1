<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Jeevitha K S</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 4rem;
            margin-top: 2rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .info-card {
            background: var(--surface-color);
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: flex-start;
            gap: 1.5rem;
            transition: transform 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .info-icon {
            width: 50px;
            height: 50px;
            background: rgba(6, 182, 212, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .info-icon svg {
            width: 24px;
            height: 24px;
        }

        .info-content h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .info-content p, .info-content a {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .info-content a:hover {
            color: var(--primary);
        }

        .contact-form {
            background: var(--surface-color);
            padding: 3rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-main);
        }

        .form-control {
            width: 100%;
            padding: 1rem;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-family: var(--font-body);
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.2);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 150px;
        }

        @media (max-width: 992px) {
            .contact-grid {
                grid-template-columns: 1fr;
            }
            .contact-form {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <main class="section fade-in">
        <div class="container">
            <div style="text-align: center; margin-bottom: 4rem;" class="fade-in delay-1">
                <h2>Get In <span class="text-gradient">Touch</span></h2>
                <p style="color: var(--text-muted); max-width: 600px; margin: 0 auto;">Feel free to reach out for collaborations, opportunities, or just a friendly chat.</p>
            </div>

            <div class="contact-grid">
                <!-- Contact Info -->
                <div class="contact-info fade-in delay-2">
                    <div class="info-card">
                        <div class="info-icon">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        </div>
                        <div class="info-content">
                            <h3>Email</h3>
                            <a href="mailto:contact@jeevi.com">contact@jeevi.com</a>
                        </div>
                    </div>

                    <div class="info-card">
                        <div class="info-icon">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                        </div>
                        <div class="info-content">
                            <h3>Location</h3>
                            <p>Available for Remote Work</p>
                        </div>
                    </div>

                    <div class="info-card">
                        <div class="info-icon">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path><rect x="2" y="9" width="4" height="12"></rect><circle cx="4" cy="4" r="2"></circle></svg>
                        </div>
                        <div class="info-content">
                            <h3>LinkedIn</h3>
                            <a href="#" target="_blank">linkedin.com/in/jeevi</a>
                        </div>
                    </div>
                </div>

                <!-- Contact Form -->
                <div class="contact-form fade-in delay-3">
                    <form onsubmit="event.preventDefault(); alert('Message sent successfully! (This is a static demo)');">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" class="form-control" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label for="email">Your Email</label>
                            <input type="email" id="email" class="form-control" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" class="form-control" required placeholder="Project Inquiry">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" class="form-control" required placeholder="Hello Jeevitha K S, I would like to..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" height="1.2em" width="1.2em" xmlns="http://www.w3.org/2000/svg"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            Send Message
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="layout.js"></script>
</body>
</html>
